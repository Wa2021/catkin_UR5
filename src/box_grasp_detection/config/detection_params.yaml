# Box Detection Parameters

# Point cloud preprocessing
voxel_leaf_size: 0.005           # 5mm voxel grid for downsampling
passthrough_min_z: 0.01          # Minimum Z value (1cm from camera)
passthrough_max_z: 1.5           # Maximum Z value (1.5m from camera)
sor_mean_k: 50                   # Statistical outlier removal: neighbors
sor_stddev_mul: 1.0              # Statistical outlier removal: std dev multiplier

# Plane segmentation (table removal)
plane_distance_threshold: 0.01   # 1cm threshold for plane fitting
plane_max_iterations: 1000       # RANSAC iterations

# Clustering
cluster_tolerance: 0.02          # 2cm distance for clustering
cluster_min_size: 100            # Minimum points per cluster
cluster_max_size: 25000          # Maximum points per cluster

# Box filtering
min_box_volume: 0.00001          # Minimum volume: 10 cm³
max_box_volume: 0.01             # Maximum volume: 10000 cm³ (10 liters)

# Gripper parameters
gripper_width: 0.085             # Maximum gripper opening: 85mm (adjust for your gripper)
gripper_depth: 0.05              # Gripper finger depth: 50mm
approach_distance: 0.15          # Pre-grasp approach distance: 15cm
grasp_offset: 0.0                # Offset from object surface

# Grasp scoring weights (must sum to 1.0)
weight_stability: 0.4            # Weight for grasp stability
weight_reachability: 0.3         # Weight for reachability
weight_collision: 0.3            # Weight for collision avoidance
